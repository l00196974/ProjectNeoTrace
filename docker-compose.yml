version: '3.8'

services:
  neotrace-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: neotrace-api
    ports:
      - "5000:5000"
    volumes:
      - ./data:/app/data
      - ./models:/app/models
      - ./logs:/app/logs
    environment:
      - FLASK_HOST=0.0.0.0
      - FLASK_PORT=5000
      - FLASK_DEBUG=False
    env_file:
      - .env
    command: python src/serving/api.py
    restart: unless-stopped

  neotrace-training:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: neotrace-training
    volumes:
      - ./data:/app/data
      - ./models:/app/models
      - ./logs:/app/logs
    env_file:
      - .env
    command: python scripts/offline_training_pipeline.py
    profiles:
      - training
